name: 'AuditLens Compliance Check'
description: 'Scan pull requests for compliance impact using the AuditLens skill.'
branding:
  icon: 'shield'
  color: 'indigo'

inputs:
  evidence_dir:
    description: 'Path to the directory containing evidence documents'
    required: true
    default: '.'
  framework:
    description: 'Target compliance framework (iso27001, soc2, hipaa, nist_csf)'
    required: true
    default: 'iso27001'

runs:
  using: "composite"
  steps:
    - name: Checkout AuditLens skill
      shell: bash
      run: |
        echo "## 🛡️ AuditLens Compliance Check" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Framework:** ${{ inputs.framework }}" >> $GITHUB_STEP_SUMMARY
        echo "**Evidence Directory:** ${{ inputs.evidence_dir }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        # List evidence files found
        FILE_COUNT=$(find "${{ inputs.evidence_dir }}" -type f \( -name "*.pdf" -o -name "*.docx" -o -name "*.md" -o -name "*.txt" -o -name "*.csv" -o -name "*.xlsx" -o -name "*.json" -o -name "*.yml" \) 2>/dev/null | wc -l | tr -d ' ')
        echo "**Evidence files found:** ${FILE_COUNT}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY

        if [ "$FILE_COUNT" -eq "0" ]; then
          echo "> [!WARNING]" >> $GITHUB_STEP_SUMMARY
          echo "> No evidence files found in \`${{ inputs.evidence_dir }}\`. Add compliance documentation to enable full analysis." >> $GITHUB_STEP_SUMMARY
        else
          echo "### Files Detected" >> $GITHUB_STEP_SUMMARY
          find "${{ inputs.evidence_dir }}" -type f \( -name "*.pdf" -o -name "*.docx" -o -name "*.md" -o -name "*.txt" -o -name "*.csv" -o -name "*.xlsx" \) -exec basename {} \; 2>/dev/null | head -20 | while read f; do
            echo "- \`$f\`" >> $GITHUB_STEP_SUMMARY
          done
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "> [!NOTE]" >> $GITHUB_STEP_SUMMARY
          echo "> For full AI-powered gap analysis, run AuditLens locally with your agent: \`npx auditlens\`" >> $GITHUB_STEP_SUMMARY
        fi

        echo "" >> $GITHUB_STEP_SUMMARY
        echo "*Generated by [AuditLens](https://github.com/adhit-r/audit-lens)*" >> $GITHUB_STEP_SUMMARY
